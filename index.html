const SIRI_VOICE_PATTERNS = [
  "Siri 声2", "Siri Voice 2", "Siri 女性2", "O-Ren", "Otoya",
];
const FALLBACK_VOICE_NAMES = ["Google 日本語", "Hattori", "Kyoko"];

function getJaVoices() {
  if (!window.speechSynthesis) return [];
  const voices = window.speechSynthesis.getVoices();
  return voices.filter(v => v.lang === "ja-JP" || v.lang === "ja_JP" || v.lang.startsWith("ja"));
}

function pickBestVoice() {
  const jaVoices = getJaVoices();
  if (jaVoices.length === 0) return null;
  for (const pattern of SIRI_VOICE_PATTERNS) {
    const found = jaVoices.find(v => v.name.includes(pattern));
    if (found) return found;
  }
  const localVoices = jaVoices.filter(v => v.localService);
  const pool = localVoices.length > 0 ? localVoices : jaVoices;
  for (const name of FALLBACK_VOICE_NAMES) {
    const found = pool.find(v => v.name.includes(name));
    if (found) return found;
  }
  return pool[0];
}

let speakDebounceTimer = null;
const SPEAK_DEBOUNCE_MS = 120;
const CANCEL_SPEAK_GAP_MS = 50;

function speakText(text, rate = 0.6) {
  if (speakDebounceTimer) clearTimeout(speakDebounceTimer);
  speakDebounceTimer = setTimeout(() => {
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      setTimeout(() => {
        try {
          const utter = new SpeechSynthesisUtterance(text);
          utter.lang = "ja-JP";
          utter.rate = rate;       
          utter.pitch = 0.95;      
          utter.volume = 1.0;
          const voice = pickBestVoice();
          if (voice) utter.voice = voice;
          window.speechSynthesis.speak(utter);
        } catch {}
      }, CANCEL_SPEAK_GAP_MS);
    } catch {}
  }, SPEAK_DEBOUNCE_MS);
}

function speakPhrases(phrases, rate = 0.6, pauseMs = 550) {
  if (speakDebounceTimer) clearTimeout(speakDebounceTimer);
  try {
    if (!window.speechSynthesis || !phrases || phrases.length === 0) return;
    window.speechSynthesis.cancel();
    const voice = pickBestVoice();
    let i = 0;
    function speakNext() {
      if (i >= phrases.length) return;
      const phrase = phrases[i];
      const utter = new SpeechSynthesisUtterance(phrase);
      utter.lang = "ja-JP";
      utter.rate = rate;
      utter.pitch = 0.95;
      utter.volume = 1.0;
      if (voice) utter.voice = voice;
      i++;

      let advanced = false;
      function advance() {
        if (advanced) return; 
        advanced = true;
        if (i < phrases.length) setTimeout(speakNext, pauseMs);
      }

      utter.onend = advance;
      utter.onerror = advance; 

      window.speechSynthesis.speak(utter);

      const estimatedMs = (phrase.length * 220) / rate + 1200;
      setTimeout(advance, estimatedMs);
    }
    setTimeout(speakNext, CANCEL_SPEAK_GAP_MS);
  } catch {}
}

let talkWatchdogTimer = null;
let lastSpeechCheckTime = Date.now();
function watchdogSpeechEngine() {
  if (typeof window === "undefined" || !window.speechSynthesis) return;
  if (talkWatchdogTimer) clearInterval(talkWatchdogTimer);
  talkWatchdogTimer = setInterval(() => {
    try {
      const synth = window.speechSynthesis;
      if (synth.pending && !synth.speaking) {
        const stuckDuration = Date.now() - lastSpeechCheckTime;
        if (stuckDuration > 3000) {
          synth.cancel();
        }
      } else {
        lastSpeechCheckTime = Date.now();
      }
    } catch {}
  }, 2000);
}
if (typeof window !== "undefined") {
  watchdogSpeechEngine();
}

let speechUnlocked = false;
function unlockSpeech() {
  try {
    if (!window.speechSynthesis || speechUnlocked) return;
    const utter = new SpeechSynthesisUtterance(" "); 
    utter.volume = 0.01;
    utter.rate = 10; 
    window.speechSynthesis.speak(utter);
    speechUnlocked = true;
  } catch {}
}

let audioCtx = null;
function getAudioCtx() {
  try {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
    }
    return audioCtx;
  } catch { return null; }
}

function playTone(freq, duration, delay = 0, type = "sine", gainPeak = 0.25) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const playNow = () => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const startTime = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(gainPeak, startTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.02);
  };
  if (ctx.state === "suspended") {
    ctx.resume().then(playNow).catch(() => {});
  } else {
    playNow();
  }
}

function playCorrectSound() {
  try {
    playTone(880, 0.18, 0, "sine", 0.22);   
    playTone(1318, 0.22, 0.13, "sine", 0.2);

}

function vibrate(pattern) {
  try {

}

function triggerIOSHaptic() {
  try {
    const input = document.createElement("input");
    input.type = "checkbox";
    input.setAttribute("switch", "");
    input.style.position = "fixed";
    input.style.opacity = "0";
    input.style.pointerEvents = "none";
    input.style.width = "1px";
    input.style.height = "1px";
    document.body.appendChild(input);
    input.click();
    setTimeout(() => document.body.removeChild(input), 50);
  } catch {}
}

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

function addDays(base, n) {
  const d = new Date(base+"T00:00:00");
  d.setDate(d.getDate()+n);

}

function makeQs(pair) {
  const TOTAL = QUIZ_TOTAL;
  const DRAG_PROB = 0.3;   
  const DOUBLE_PROB = 0.3; 

  const qs = [];
  for (let i = 0; i < TOTAL; i++) {
    const ansIdx = Math.random() < 0.5 ? 0 : 1; 
    const type = Math.random() < DRAG_PROB ? "drag" : "tap";
    const order = Math.random() < 0.5 ? [0, 1] : [1, 0];
    const ch = pair[ansIdx];
    const isDouble = type === "tap" && Math.random() < DOUBLE_PROB;
    const text = type === "drag"
      ? `「${ch}」をここに運んで！`
      : isDouble
        ? `「${ch}」を2回タップして！`
        : `「${ch}」はどっち？`;
    qs.push({ type, ansIdx, order, isDouble, text });
  }
  return qs;
}

function getStatus(id, steps, today) {
  const p = steps[id];
  if (!p) return "new";
  if (p.passed) {
    if (p.passedDate === today) return "passed_today";
    const reviews = REVIEW_DAYS.map(d => addDays(p.passedDate, d));
    const done = p.reviewsDone || [];
    const next = reviews.find(r => !done.includes(r));
    if (!next) return "mastered";
    if (next === today) return done.includes(today) ? "review_done" : "review";
    if (next < today)  return done.includes(today) ? "review_done" : "overdue";
    return "waiting";
  }
  if (p.lastTried === today) return "done_today";
  return "retry";
}

function nextReviewDayNum(id, steps, today) {
  const p = steps[id];
  if (!p?.passed) return null;
  const reviews = REVIEW_DAYS.map(d => addDays(p.passedDate, d));
  const done = p.reviewsDone || [];
  const idx = reviews.findIndex(r => !done.includes(r));
  if (idx === -1) return null;
  if (reviews[idx] === today || reviews[idx] < today) return REVIEW_DAYS[idx];
  return null;
}

function statusEmoji(s) {
  return { mastered:"🌟", review:"🔁", review_done:"✅", overdue:"⚠️",
           done_today:"✅", passed_today:"🎉", waiting:"💤", retry:"💪", new:"✨" }[s] || "✨";
}

function getTodayTasks(steps, today, skipIds = new Set(), blockNew = false) {
  const tasks = [];
  const doneToday = STEPS.some(s => {
    if (skipIds.has(s.id)) return false;
    const st = getStatus(s.id, steps, today);
    return st === "done_today" || st === "passed_today";
  });
  let newShown = false, overdueCount = 0;
  for (const s of STEPS) {
    if (skipIds.has(s.id)) continue;
    const st = getStatus(s.id, steps, today);
    if (st === "review") tasks.push({ ...s, taskType: st });
    else if (st === "overdue") {
      if (overdueCount < 3) { tasks.push({ ...s, taskType: st }); overdueCount++; }
    } else if ((st === "new" || st === "retry") && !newShown && !doneToday && !blockNew) {
      tasks.push({ ...s, taskType: st });
      newShown = true;
    }
  }
  const totalOverdue = STEPS.filter(s => getStatus(s.id, steps, today) === "overdue").length;
  const extraOverdue = totalOverdue > 3 ? totalOverdue - 3 : 0;
  return { tasks, extraOverdue };
}

function computeReset(prev, date) {
  const log = prev.log || [];
  const ids = [...new Set(log.filter(e => e.date === date).map(e => e.stepId))];
  const steps = { ...prev.steps };
  for (const id of ids) {
    const p = steps[id];
    if (!p) continue;
    const later = log.filter(e => e.stepId === id && e.date > date);
    if (p.passedDate && p.passedDate < date) {
      const np = { ...p, reviewsDone: (p.reviewsDone || []).filter(d => d !== date) };
      delete np.lastTried; delete np.lastScore;
      steps[id] = np;
    } else if (later.length > 0) {
      const np = { ...p, reviewsDone: (p.reviewsDone || []).filter(d => d !== date) };
      delete np.lastTried; delete np.lastScore;
      steps[id] = np;
    } else {
      delete steps[id];
    }
  }
  return { ...prev, steps, log: log.filter(e => e.date !== date) };
}

function computeResetStep(prev, stepId) {
  const steps = { ...prev.steps };
  delete steps[stepId];
  const log = (prev.log || []).filter(e => e.stepId !== stepId);
  return { ...prev, steps, log };
}

function computeResetMilestone(prev, stepId, label) {
  if (label === "0日目") {
    return computeResetStep(prev, stepId);
  }
  const steps = { ...prev.steps };
  const p = steps[stepId];
  if (!p) return prev;
  const dayNum = parseInt(label, 10); 
  const reviewDate = p.passedDate ? addDays(p.passedDate, dayNum) : null;
  const newDone = (p.reviewsDone || []).filter(d => d !== reviewDate);
  const np = { ...p, reviewsDone: newDone };
  delete np.lastTried; delete np.lastScore;
  steps[stepId] = np;
  const log = (prev.log || []).filter(e => !(e.stepId === stepId && e.dayLabel === label));
  return { ...prev, steps, log };
}

function TraceWriting({ ch, color, onComplete }) {
  const canvasRef = useRef(null);
  const offscreenRef = useRef(null);   
  const charPixelsRef = useRef(null);  
  const containerRef = useRef(null);
  const [traced, setTraced] = useState(0);
  const [isDrawing, setIsDrawing] = useState(false);
  const [canvasSize, setCanvasSize] = useState(300);
  const lastPoint = useRef(null);
  const TRACE_GOAL = 18;
  const SNAP_RADIUS = 65; 

  useEffect(() => {
    function updateSize() {
      const maxW = Math.min(window.innerWidth - 40, 480 - 40);
      const size = Math.max(260, Math.min(maxW, 360));
      setCanvasSize(size);
    }
    updateSize();
    window.addEventListener("resize", updateSize);
    return () => window.removeEventListener("resize", updateSize);
  }, []);

  useEffect(() => {
    const off = document.createElement("canvas");
    off.width = canvasSize;
    off.height = canvasSize;
    const octx = off.getContext("2d");
    octx.clearRect(0, 0, canvasSize, canvasSize);
    octx.fillStyle = "#000";
    octx.textAlign = "center";
    octx.textBaseline = "middle";
    octx.font = `bold ${canvasSize * 0.82}px 'UD デジタル 教科書体 N-R','UDDigiKyokashoN-R','UD Digi Kyokasho NK-R','HGS教科書体','HG教科書体','Hiragino Mincho ProN','Hiragino Maru Gothic Pro','Yu Gothic',sans-serif`;
    octx.fillText(ch, canvasSize / 2, canvasSize / 2 + canvasSize * 0.02);
    offscreenRef.current = off;

    const imgData = octx.getImageData(0, 0, canvasSize, canvasSize).data;
    const pts = [];
    const STEP_PX = 3; 
    for (let y = 0; y < canvasSize; y += STEP_PX) {
      for (let x = 0; x < canvasSize; x += STEP_PX) {
        const alpha = imgData[(y * canvasSize + x) * 4 + 3];
        if (alpha > 80) pts.push({ x, y });
      }
    }
    charPixelsRef.current = pts;
  }, [ch, canvasSize]);

  function snapToChar(pos) {
    const pts = charPixelsRef.current;
    if (!pts || pts.length === 0) return pos;
    let best = null;
    let bestDist = Infinity;
    for (const p of pts) {
      const dx = p.x - pos.x;
      const dy = p.y - pos.y;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; best = p; }
    }
    if (best && bestDist <= SNAP_RADIUS * SNAP_RADIUS) {
      const dist = Math.sqrt(bestDist);
      const t = dist / SNAP_RADIUS; 
      const snapStrength = 0.97 - t * 0.17;
      return {
        x: pos.x * (1 - snapStrength) + best.x * snapStrength,
        y: pos.y * (1 - snapStrength) + best.y * snapStrength,
      };
    }
    return pos; 
  }

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top,
    };
  }

  function startDraw(e) {
    e.preventDefault();
    e.currentTarget.setPointerCapture?.(e.pointerId); 
    setIsDrawing(true);
    const canvas = canvasRef.current;
    const rawPos = getPos(e, canvas);
    lastPoint.current = snapToChar(rawPos);
  }

  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const rawPos = getPos(e, canvas);
    const pos = snapToChar(rawPos); 
    if (lastPoint.current) {
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(14, canvasSize * 0.045);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.moveTo(lastPoint.current.x, lastPoint.current.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
    lastPoint.current = pos;
    setTraced(t => Math.min(t + 1, TRACE_GOAL));
  }

  function endDraw(e) {
    e.preventDefault();
    setIsDrawing(false);
    lastPoint.current = null;
  }

  function clearCanvas() {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setTraced(0);
  }

  const pct = Math.round((traced / TRACE_GOAL) * 100);
  const canFinish = traced >= TRACE_GOAL;

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16, width:"100%" }}>
      <div ref={containerRef} style={{
        position:"relative", width:canvasSize, height:canvasSize,
        background:"#fff", borderRadius:24, border:`3px solid ${C.border}`,
        boxShadow:"0 4px 16px rgba(0,0,0,0.08)", overflow:"hidden",
        touchAction:"none",
      }}>
        <div style={{
          position:"absolute", inset:0, display:"flex",
          alignItems:"center", justifyContent:"center",
          fontSize: canvasSize * 0.82, fontWeight:"bold", color: color,
          opacity:0.22, userSelect:"none", pointerEvents:"none",
          lineHeight:1,
        }}>
          {ch}
        </div>
        <canvas
          ref={canvasRef}
          width={canvasSize}
          height={canvasSize}
          onPointerDown={startDraw}
          onPointerMove={draw}
          onPointerUp={endDraw}
          onPointerCancel={endDraw}
          onPointerLeave={endDraw}
          style={{ position:"absolute", inset:0, touchAction:"none" }}
        />
      </div>

      <div style={{ width: canvasSize }}>
        <div style={{ height:10, background:C.border, borderRadius:5, overflow:"hidden" }}>
          <div style={{ height:"100%", background:C.ok, width:`${pct}%`, transition:"width 0.2s" }} />
        </div>
      </div>

      <div style={{ display:"flex", gap:12 }}>
        <button onClick={clearCanvas}
          style={{ background:"#fff", border:`1.5px solid ${C.border}`, borderRadius:12,
            padding:"10px 18px", fontSize:14, fontWeight:"bold", cursor:"pointer", color:C.muted }}>
          🔄 やりなおす
        </button>
        <button onClick={onComplete} disabled={!canFinish}
          style={{
            background: canFinish ? C.ok : C.border,

function Confetti() {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width = window.innerWidth;
    const H = canvas.height = window.innerHeight;

    const COLORS = ["#FFE066", "#FFB3C6", "#A8D8EA", "#B5EAD7", "#FFDAC1", "#5DBE8A"];
    const COUNT = 90;
    const particles = Array.from({ length: COUNT }, () => ({
      x: Math.random() * W,
      y: -20 - Math.random() * H * 0.5, 
      size: 6 + Math.random() * 6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      speedY: 2 + Math.random() * 3,
      speedX: (Math.random() - 0.5) * 2,
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 10,
      shape: Math.random() < 0.5 ? "rect" : "circle",
    }));

    let frame = 0;
    const TOTAL_FRAMES = 220; 
    let animId;

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.y += p.speedY;
        p.x += p.speedX;
        p.rotation += p.rotationSpeed;
        const fadeStart = TOTAL_FRAMES * 0.7;
        const alpha = frame > fadeStart ? Math.max(0, 1 - (frame - fadeStart) / (TOTAL_FRAMES - fadeStart)) : 1;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.fillStyle = p.color;
        if (p.shape === "rect") {
          ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      frame++;
      if (frame < TOTAL_FRAMES) {
        animId = requestAnimationFrame(draw);
      } else {
        ctx.clearRect(0, 0, W, H);
      }
    }
    animId = requestAnimationFrame(draw);

    return () => {
      if (animId) cancelAnimationFrame(animId);
    };
  }, []);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "fixed", inset: 0, width: "100vw", height: "100vh",
        pointerEvents: "none", zIndex: 9999,
      }}
    />
  );
}

function DragQuestion({ pair, q, colA, colB, onAnswer }) {
  const [phase, setPhase] = useState("idle"); 
  const [draggingPairIdx, setDraggingPairIdx] = useState(null);
  const [droppedPairIdx, setDroppedPairIdx] = useState(null);
  const [overDrop, setOverDrop] = useState(false);
  const [result, setResult] = useState(null); 
  const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
  const containerRef = useRef(null);
  const dropZoneRef = useRef(null);
  const cardStartPos = useRef({ x: 0, y: 0 }); 

  const colors = [colA, colB];

  function isOverDropZone(x, y) {
    const el = dropZoneRef.current;
    if (!el) return false;
    const rect = el.getBoundingClientRect();
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  function handlePointerDown(pairIdx, e) {
    if (phase !== "idle") return;
    e.preventDefault();
    e.currentTarget.setPointerCapture?.(e.pointerId);
    cardStartPos.current = { x: e.clientX, y: e.clientY };
    setDragPos({ x: 0, y: 0 });
    setPhase("dragging");
    setDraggingPairIdx(pairIdx);
    setOverDrop(false);
  }

  function handlePointerMove(e) {
    if (phase !== "dragging") return;
    e.preventDefault();
    const dx = e.clientX - cardStartPos.current.x;
    const dy = e.clientY - cardStartPos.current.y;
    setDragPos({ x: dx, y: dy }); 
    setOverDrop(isOverDropZone(e.clientX, e.clientY));
  }

  function handlePointerUp(e) {
    if (phase !== "dragging") return;
    e.preventDefault();
    if (isOverDropZone(e.clientX, e.clientY)) {
      const correct = draggingPairIdx === q.ansIdx;
      setPhase("dropped");
      setDroppedPairIdx(draggingPairIdx);
      setOverDrop(false);
      setResult(correct ? "correct" : "wrong");
      onAnswer(correct);
    } else {
      setPhase("idle");
      setDraggingPairIdx(null);
      setOverDrop(false);
      setDragPos({ x: 0, y: 0 });
    }
  }

  return (
    <div
      ref={containerRef}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerCancel={handlePointerUp}
      style={{ padding: "0 20px", touchAction: "none" }}
    >
      <div ref={dropZoneRef} style={{
        width: 130, height: 130, borderRadius: 24, margin: "0 auto 24px",
        border: `3px dashed ${overDrop ? C.ok : result === "correct" ? C.ok : result === "wrong" ? C.ng : C.border}`,
        background: overDrop ? C.ok+"22"
          : result === "correct" ? C.ok+"33"
          : result === "wrong"   ? C.ng+"22" : "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: phase === "dropped" ? 76 : 22,
        fontWeight: "bold",
        color: result === "correct" ? C.ok : result === "wrong" ? C.ng : C.muted,
        transition: "all 0.2s",
      }}>
        {phase === "dropped" ? pair[droppedPairIdx] : "ここへ"}
      </div>

      <div style={{ display: "flex", gap: 20, justifyContent: "center" }}>
        {q.order.map((pairIdx) => {
          const isDraggingThis = phase === "dragging" && draggingPairIdx === pairIdx;
          const isDropped      = phase === "dropped"  && droppedPairIdx === pairIdx;
          return (
            <div
              key={pairIdx}
              onPointerDown={phase === "idle" ? e => handlePointerDown(pairIdx, e) : undefined}
              style={{
                width: 130, height: 130, borderRadius: 20,
                background: isDropped ? "#ddd" : colors[pairIdx],
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 72, fontWeight: "bold", lineHeight: 1,
                opacity: isDropped ? 0.3 : 1,
                userSelect: "none", WebkitUserSelect: "none",
                touchAction: "none",
                border: isDraggingThis ? `3px solid ${C.text}` : "3px solid transparent",
                boxShadow: isDraggingThis
                  ? "0 14px 32px rgba(0,0,0,0.28)"
                  : "0 3px 10px rgba(0,0,0,0.1)",
                transform: isDraggingThis
                  ? `translate(${dragPos.x}px, ${dragPos.y}px) scale(1.15)`
                  : "translate(0px, 0px) scale(1)",
                transition: isDraggingThis ? "none" : "transform 0.2s, box-shadow 0.2s",
                zIndex: isDraggingThis ? 10 : 1,
                position: "relative",
                cursor: phase === "idle" ? "grab" : "default",
              }}
            >
              {pair[pairIdx]}
            </div>
          );
        })}
      </div>

      {phase !== "dropped" && (
        <div style={{ textAlign: "center", fontSize: 12, color: C.muted, marginTop: 12 }}>
          カードをゆびでつかんで、上の枠へ運んでね！
        </div>
      )}
    </div>
  );
}

function App() {
  const [work, setWork] = useState(load);
  const [screen, setScreen] = useState("home");
  const [customDate, setCustomDate] = useState("");
  const [skipIds, setSkipIds] = useState(new Set());
  const [extraUnlocked, setExtraUnlocked] = useState(false);

  const [activeStep, setActiveStep]   = useState(null);
  const [quizMode, setQuizMode]       = useState("new");
  const [reviewDay, setReviewDay]     = useState(null);
  const [qs, setQs]                   = useState([]);
  const [qi, setQi]                   = useState(0);
  const [score, setScore]             = useState(0);
  const [showAns, setShowAns]         = useState(false);
  const [selectedPairIdx, setSelectedPairIdx] = useState(null);
  const [ansCorrect, setAnsCorrect]   = useState(false);
  const [tapCount, setTapCount]       = useState({}); 
  const [expandedStepId, setExpandedStepId] = useState(null); 
  const [introCharIdx, setIntroCharIdx] = useState(0);   
  const [introTapCount, setIntroTapCount] = useState(0); 
  const [introSubPhase, setIntroSubPhase] = useState("trace"); 
  const [outroCharIdx, setOutroCharIdx] = useState(0); 

  const today = customDate || toDateStr(new Date());

  useEffect(() => {
    const metas = [
      { name: "viewport", content: "width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" },
      { name: "apple-mobile-web-app-capable", content: "yes" },
      { name: "apple-mobile-web-app-status-bar-style", content: "black-translucent" },
      { name: "mobile-web-app-capable", content: "yes" },
    ];
    const addedTags = [];
    for (const m of metas) {
      let tag = document.querySelector(`meta[name="${m.name}"]`);
      if (!tag) {
        tag = document.createElement("meta");
        tag.setAttribute("name", m.name);
        document.head.appendChild(tag);
        addedTags.push(tag);
      }
      tag.setAttribute("content", m.content);
    }
    return () => {
      addedTags.forEach(tag => tag.remove());
    };
  }, []);

  useEffect(() => { persist(work); }, [work]);

  useEffect(() => {
    setSkipIds(new Set());
    setExtraUnlocked(false);
  }, [today]);

  useEffect(() => {
    if (screen === "quiz" && qs[qi]) {
      const timer = setTimeout(() => speakText(qs[qi].text), 350);
      return () => clearTimeout(timer);
    }
  }, [screen, qi, qs]);

  useEffect(() => {
    if (screen === "intro" && activeStep) {
      const ch = activeStep.pair[introCharIdx];
      const word = activeStep.words ? activeStep.words[introCharIdx] : null;
      const customPhrase = activeStep.introPhrase ? activeStep.introPhrase[introCharIdx] : null;
      const timer = setTimeout(() => {
        if (Array.isArray(customPhrase)) {
          speakPhrases(customPhrase, 0.6, 600);
        } else {
          const text = word ? `${word}の${ch}` : ch;
          speakText(text, 0.6);
        }
      }, 350);
      return () => clearTimeout(timer);
    }
  }, [screen, introCharIdx, activeStep]);

  useEffect(() => {
    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
    }
  }, []);

  function upd(fn) { setWork(prev => fn(prev)); }

  function startQuiz(step, mode) {
    unlockSpeech();
    const ctx = getAudioCtx();
    if (ctx) ctx.resume().catch(() => {});

    setActiveStep(step);
    setQuizMode(mode);
    setReviewDay(nextReviewDayNum(step.id, work.steps, today));
    setQs(makeQs(step.pair));
    setQi(0); setScore(0); setShowAns(false);
    setSelectedPairIdx(null); setAnsCorrect(false); setTapCount({});
    if (mode === "new") {
      setIntroCharIdx(0);
      setIntroTapCount(0);
      setIntroSubPhase("trace");
      setScreen("intro");
    } else {
      setScreen("quiz");
    }
  }

  function beginQuizFromIntro() {
    setScreen("quiz");
  }

  function handleTapAnswer(pairIdx) {
    if (showAns) return;
    const q = qs[qi];
    if (q.isDouble) {
      const count = (tapCount[pairIdx] || 0) + 1;
      if (count < 2) {
        setTapCount({ [pairIdx]: count });
        return;
      }
    }
    const correct = pairIdx === q.ansIdx;
    setSelectedPairIdx(pairIdx);
    setAnsCorrect(correct);
    setShowAns(true);
    setTapCount({});
    if (correct) { setScore(s => s + 1); feedbackCorrect(); } else { feedbackWrong(); }
  }

  function handleDragAnswer(correct) {
    setAnsCorrect(correct);
    setShowAns(true);
    if (correct) { setScore(s => s + 1); feedbackCorrect(); } else { feedbackWrong(); }
  }

  function next() {
    if (qi + 1 >= qs.length) {
      setScreen("result");
    } else {
      setQi(i => i + 1);
      setShowAns(false);
      setSelectedPairIdx(null);
      setAnsCorrect(false);
      setTapCount({});
    }
  }

  function finish() {
    const total = qs.length;
    const passed = score >= PASS_THRESHOLD;
    const isRev = quizMode === "review" || quizMode === "overdue";
    const dayLabel = isRev ? `${reviewDay}日後` : "0日目";
    upd(prev => {
      const steps = { ...prev.steps };
      const p = { ...(steps[activeStep.id] || {}) };
      p.lastTried = today; p.lastScore = score;
      if (isRev) {
        const done = [...(p.reviewsDone || [])];
        if (!done.includes(today)) done.push(today);
        p.reviewsDone = done;
      } else if (passed && !p.passed) {
        p.passed = true; p.passedDate = today; p.reviewsDone = [];
      }
      steps[activeStep.id] = p;
      const prevLog = prev.log || [];
      const attempt = prevLog.filter(e => e.stepId === activeStep.id && e.dayLabel === dayLabel).length + 1;
      const log = [
        { date:today, stepId:activeStep.id, pair:activeStep.pair,
          score, total, passed:isRev?null:passed, mode:quizMode, dayLabel, attempt },
        ...prevLog,
      ];
      if (log.length > 1000) log.splice(1000);
      return { ...prev, steps, log };
    });
    setSkipIds(prev => new Set([...prev, activeStep.id]));
    setExtraUnlocked(false); 
    setScreen("home");
  }

  const didNewToday = STEPS.some(s => {
    const st = getStatus(s.id, work.steps, today);
    return st === "done_today" || st === "passed_today";
  });
  const blockNew = didNewToday && !extraUnlocked;
  const { tasks: todayTasks, extraOverdue } = getTodayTasks(work.steps, today, skipIds, blockNew);
  const anyDoneToday = didNewToday || skipIds.size > 0;
  const allDoneNow   = todayTasks.length === 0 && anyDoneToday;
  const moreAvailable = getTodayTasks(work.steps, today, skipIds, false)
    .tasks.some(t => t.taskType === "new" || t.taskType === "retry");

  if (screen === "intro") {
    const pair = activeStep.pair;
    const ch = pair[introCharIdx];
    const kana = activeStep.kana[introCharIdx];
    const word = activeStep.words ? activeStep.words[introCharIdx] : null;
    const customPhrase = activeStep.introPhrase ? activeStep.introPhrase[introCharIdx] : null;
    const isPhraseArray = Array.isArray(customPhrase);
    const displayPhrase = isPhraseArray
      ? customPhrase.join("　→　")
      : (word ? `${word}の「${ch}」` : `「${ch}」`);
    function playIntroPhrase() {
      if (isPhraseArray) {
        speakPhrases(customPhrase, 0.6, 600);

        speakText(word ? `${word}の${ch}` : ch, 0.6);

    }
    const color = STEP_COLORS[(activeStep.id - 1 + introCharIdx) % STEP_COLORS.length];
    const TARGET_TAPS = 5;
    const isLastChar = introCharIdx === pair.length - 1;

    function handleTraceComplete() {
      setIntroSubPhase("tap");

    return (

                padding:"1px 8px", display:"inline-block", marginTop:2 }}>

          <div style={{ display:"flex", gap:5 }}>

                      <div style={{ position:"absolute", top:6, right:6, background:C.yellow,
                        borderRadius:"50%", width:28, height:28, display:"flex",
                        alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:"bold" }}>
                        1
                      </div>
                    )}
                    <div style={{ fontSize:82, lineHeight:1, fontWeight:"bold" }}>{pair[pairIdx]}</div>
                    <div style={{ fontSize:16, color:C.muted, marginTop:6, fontWeight:"bold" }}>
                      {activeStep.kana[pairIdx]}
                    </div>
                  </button>
                );
              })}
            </div>
            {showAns && (
              <div style={{ padding:"14px 20px", display:"flex", flexDirection:"column", gap:12 }}>
                <div style={{ background: ansCorrect ? C.ok : C.ng, borderRadius:16,
                  padding:"14px", textAlign:"center", fontSize:18, fontWeight:"bold", color:"#fff" }}>
                  {ansCorrect ? "⭕ よくできた！" : `❌ 正解は「${pair[q.ansIdx]}」だよ！`}
                </div>
                <button style={P.next} onClick={next}>
                  {qi+1 >= qs.length ? "けっかをみる →" : "つぎへ →"}
                </button>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  if (screen === "result") {
    const total  = qs.length;
    const pct    = Math.round((score / total) * 100);
    const passed = score >= PASS_THRESHOLD;
    const isRev  = quizMode === "review" || quizMode === "overdue";
    const isNewPass = !isRev && passed; 

    function goNext() {
      if (isNewPass) {
        setOutroCharIdx(0);
        setScreen("outrotrace");
      } else {
        finish();
      }
    }

    return (
      <div style={P.page}>
        {passed && <Confetti key={`${today}-${score}-${quizMode}`} />}
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", padding:"40px 20px", gap:16 }}>
          <div style={{ fontSize:64 }}>{passed ? "🎉" : "🌱"}</div>
          <div style={{ fontSize:28, fontWeight:"bold" }}>{passed ? "合格！すごい！" : "もう少し！"}</div>
          <div style={{ display:"flex", alignItems:"baseline" }}>
            <span style={{ fontSize:64, fontWeight:"bold" }}>{score}</span>
            <span style={{ fontSize:24, color:C.muted }}> / {total}</span>
          </div>
          <div style={{ width:"100%", height:14, background:C.border, borderRadius:7, overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:7, width:`${pct}%`, background:passed?C.ok:C.ng }} />
          </div>
          {!isRev && passed && (
            <div style={P.note}>
              <div style={{ fontWeight:"bold", marginBottom:10 }}>🗓 {fmtJP(today)} が「0日目」！</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center" }}>
                {REVIEW_DAYS.map(d => (
                  <div key={d} style={{ background:"#FFFBF2", border:"1.5px solid #EAD8C0",
                    borderRadius:10, padding:"6px 12px", textAlign:"center" }}>
                    <div style={{ fontSize:11, color:C.muted }}>{d}日後</div>
                    <div style={{ fontSize:14, fontWeight:"bold" }}>{fmtJP(addDays(today, d))}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {!passed && !isRev && (
            <div style={P.note}>
              💪 明日またチャレンジしよう！<br />
              <span style={{ fontSize:13, color:C.muted }}>{PASS_THRESHOLD}問以上で合格です</span>
            </div>
          )}
          {isRev && (
            <div style={P.note}>
              <span style={{ background:"#FFB347", color:"#fff", borderRadius:8,
                padding:"2px 10px", fontSize:13, fontWeight:"bold" }}>
                {reviewDay}日後の復習
              </span>
              <div style={{ marginTop:8, fontSize:13, color:C.muted }}>記録しました ✅</div>
            </div>
          )}
          <button style={{ background:C.yellow, border:"none", borderRadius:20,
            padding:"14px 40px", fontSize:18, fontWeight:"bold", cursor:"pointer" }}
            onClick={goNext}>
            {isNewPass ? "さいごにもう一度なぞる →" : "ホームへ"}
          </button>
        </div>
      </div>
    );
  }

  if (screen === "outrotrace") {
    const pair = activeStep.pair;
    const ch = pair[outroCharIdx];
    const color = STEP_COLORS[(activeStep.id - 1 + outroCharIdx) % STEP_COLORS.length];
    const isLast = outroCharIdx === pair.length - 1;

    function handleOutroComplete() {
      if (isLast) {
        finish();
      } else {
        setOutroCharIdx(outroCharIdx + 1);
      }
    }

    return (
      <div style={P.page}>
        <div style={P.bar}>
          <span />
          <span style={{ fontSize:18, fontWeight:"bold" }}>さいごの なぞり書き</span>
          <span />
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center",
          padding:"24px 20px", gap:18 }}>
          <div style={{ fontSize:15, color:C.muted, textAlign:"center" }}>
            よくできたね！さいごに「{ch}」をなぞろう
          </div>
          <TraceWriting key={ch} ch={ch} color={color} onComplete={handleOutroComplete} />
          <div style={{ display:"flex", gap:8, marginTop:6 }}>
            {pair.map((c, i) => (
              <div key={i} style={{
                fontSize:14, fontWeight:"bold", padding:"4px 14px", borderRadius:14,
                background: i === outroCharIdx ? C.yellow : i < outroCharIdx ? C.ok : C.border,
                color: i < outroCharIdx ? "#fff" : C.text,
              }}>
                {c} {i < outroCharIdx ? "✓" : ""}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (screen === "stepselect") {
    const available = STEPS.filter(s => {
      if (skipIds.has(s.id)) return false;
      const st = getStatus(s.id, work.steps, today);
      return st === "new" || st === "retry" || st === "review" || st === "overdue";
    });
    return (
      <div style={P.page}>
        <div style={P.bar}>
          <button style={P.back} onClick={() => setScreen("home")}>← もどる</button>
          <span style={{ fontSize:17, fontWeight:"bold" }}>どれをやる？</span>
          <span />
        </div>
        <div style={{ padding:"12px 16px", fontSize:13, color:C.muted }}>やりたいステップをえらんでね</div>
        <div style={{ padding:"0 16px", display:"flex", flexWrap:"wrap", gap:12 }}>
          {available.length === 0 ? (
            <div style={{ textAlign:"center", width:"100%", padding:32, color:C.muted }}>
              <div style={{ fontSize:40 }}>🌟</div>
              <div style={{ marginTop:12 }}>今日やれるステップはもうないよ！</div>
            </div>
          ) : available.map(s => {
            const st = getStatus(s.id, work.steps, today);
            const isRev = st === "review" || st === "overdue";
            return (
              <button key={s.id} onClick={() => { setExtraUnlocked(true); startQuiz(s, isRev ? st : "new"); }}
                style={{ background:STEP_COLORS[s.id-1], border:"none", borderRadius:20,
                  padding:"14px 20px", display:"flex", alignItems:"center", gap:10,
                  cursor:"pointer", boxShadow:"0 2px 8px rgba(0,0,0,0.1)" }}>
                <span style={{ fontSize:32, fontWeight:"bold", letterSpacing:4 }}>{s.pair.join("・")}</span>
                <span style={{ fontSize:18 }}>{statusEmoji(st)}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  if (screen === "steps") {
    return (
      <div style={P.page}>
        <div style={P.bar}>
          <button style={P.back} onClick={() => setScreen("home")}>← もどる</button>
          <span style={{ fontSize:18, fontWeight:"bold" }}>ぜんぶのステップ</span>
          <span />
        </div>
        <div style={{ padding:16, display:"flex", flexWrap:"wrap", gap:10 }}>
          {STEPS.map((s, i) => {
            const st = getStatus(s.id, work.steps, today);
            const ok = st !== "waiting" && st !== "done_today" && st !== "passed_today"
              && st !== "mastered" && st !== "review_done";
            return (
              <button key={s.id}
                style={{ border:"none", borderRadius:20, padding:"10px 16px",
                  display:"flex", alignItems:"center", gap:6, fontWeight:"bold", fontSize:16,
                  background: st === "mastered" ? C.ok : STEP_COLORS[i],
                  opacity: ok ? 1 : 0.5, cursor: ok ? "pointer" : "default" }}
                onClick={() => ok && startQuiz(s, st === "review" || st === "overdue" ? st : "new")}>
                <span style={{ letterSpacing:2 }}>{s.pair.join("・")}</span>
                <span>{statusEmoji(st)}</span>
              </button>
            );
          })}
        </div>
        <div style={{ padding:"0 16px", fontSize:12, color:C.muted, lineHeight:2.2 }}>
          ✨あたらしい　💪チャレンジ中　🔁復習<br/>✅きょうおわり　💤まち中　🌟マスター
        </div>
      </div>
    );
  }

  if (screen === "history") {
    const log = work.log || [];
    const grouped = {};
    for (const e of log) { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); }
    const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
    const stepDetail = {};
    for (const e of log) {
      const k = `${e.stepId}__${e.dayLabel}`;
      if (!stepDetail[k]) stepDetail[k] = [];
      stepDetail[k].push(e);
    }
    return (
      <div style={P.page}>
        <div style={P.bar}>
          <button style={P.back} onClick={() => setScreen("home")}>← もどる</button>
          <span style={{ fontSize:18, fontWeight:"bold" }}>履歴・達成状況</span>
          <span />
        </div>
        <div style={{ padding:"14px 16px 0" }}>
          <div style={{ fontSize:13, fontWeight:"bold", color:C.muted, marginBottom:10 }}>📊 達成状況</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:16 }}>
            {STEPS.map((step, idx) => {
              const p = work.steps[step.id];
              if (!p) return (
                <div key={step.id} style={{ background:C.border, borderRadius:10,
                  padding:"4px 10px", fontSize:13, color:C.muted, opacity:0.4 }}>
                  {step.pair.join("・")}
                </div>
              );
              const done = p.reviewsDone || [];
              const st = getStatus(step.id, work.steps, today);
              const milestones = [
                { label:"0日目", date:p.passedDate },
                ...REVIEW_DAYS.map(d => ({ label:`${d}日後`, date: p.passed ? addDays(p.passedDate, d) : null }))
              ];
              return (
                <div key={step.id} style={{ background:"#fff", border:`2px solid ${STEP_COLORS[idx]}`,
                  borderRadius:14, padding:"10px 12px", minWidth:110 }}>
                  <div style={{ fontSize:18, fontWeight:"bold", letterSpacing:3, marginBottom:4 }}>
                    {step.pair.join(" ・ ")}
                  </div>
                  {p.passed && <div style={{ fontSize:11, color:C.muted, marginBottom:6 }}>合格：{fmtJP(p.passedDate)}</div>}
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                    {milestones.map(({ label, date }) => {
                      const isDone = label === "0日目" ? !!p.passed : (date ? done.includes(date) : false);
                      const tries  = stepDetail[`${step.id}__${label}`] || [];
                      return (
                        <div key={label} style={{ fontSize:10, fontWeight:"bold", borderRadius:6,
                          padding:"2px 6px", background: isDone ? C.ok : C.border,
                          color: isDone ? "#fff" : C.muted }}>
                          {label}{tries.length > 0 ? ` (${tries[tries.length-1].score}/${tries[tries.length-1].total})` : ""}
                        </div>
                      );
                    })}
                  </div>
                  {st === "mastered" && <div style={{ fontSize:11, color:C.ok, fontWeight:"bold", marginTop:4 }}>🌟マスター！</div>}
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ padding:"0 16px" }}>
          <div style={{ fontSize:13, fontWeight:"bold", color:C.muted, marginBottom:10 }}>📅 学習ログ</div>
          {log.length === 0 ? (
            <div style={{ textAlign:"center", padding:32, color:C.muted }}>
              <div style={{ fontSize:40 }}>📭</div>
              <div style={{ marginTop:12 }}>まだ記録がありません</div>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:16, paddingBottom:40 }}>
              {dates.map(date => (
                <div key={date}>
                  <div style={{ fontSize:14, fontWeight:"bold", color:C.muted,
                    borderBottom:"2px dashed #EAD8C0", paddingBottom:6, marginBottom:8,
                    display:"flex", alignItems:"center", gap:8 }}>
                    {fmtJPFull(date)}
                    {date === today && <span style={{ background:C.yellow, borderRadius:8,
                      padding:"1px 8px", fontSize:11, color:C.text }}>今日</span>}
                  </div>
                  {grouped[date].map((e, i) => {
                    const col     = STEP_COLORS[(e.stepId-1) % STEP_COLORS.length];
                    const isPass  = e.passed === true;
                    const isFail  = e.passed === false;
                    const isRev   = e.mode === "review" || e.mode === "overdue";
                    const tries   = (stepDetail[`${e.stepId}__${e.dayLabel}`] || []).filter(t => t.date === date);
                    return (
                      <div key={i} style={{ background:"#fff", borderRadius:14,
                        padding:"12px 14px", border:`1.5px solid ${C.border}`,
                        borderLeft:`5px solid ${col}`, marginBottom:8 }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                          <div>
                            <div style={{ fontSize:20, fontWeight:"bold", letterSpacing:3, marginBottom:4 }}>
                              {e.pair.join(" ・ ")}
                            </div>
                            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:6 }}>
                              {e.dayLabel && <span style={{ background: isRev?"#FFB347": isPass?C.ok:C.ng,
                                color:"#fff", fontSize:11, fontWeight:"bold", borderRadius:8, padding:"2px 7px" }}>
                                {e.dayLabel}</span>}
                              {isPass && <span style={{ background:C.ok, color:"#fff", fontSize:11, fontWeight:"bold", borderRadius:8, padding:"2px 7px" }}>合格🎉</span>}
                              {isFail && <span style={{ background:C.ng, color:"#fff", fontSize:11, fontWeight:"bold", borderRadius:8, padding:"2px 7px" }}>不合格</span>}
                              {isRev  && <span style={{ background:"#FFB347", color:"#fff", fontSize:11, fontWeight:"bold", borderRadius:8, padding:"2px 7px" }}>復習🔁</span>}
                            </div>
                            {tries.length > 0 && (
                              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                                {tries.map((t, ti) => (
                                  <div key={ti} style={{ fontSize:11, borderRadius:8, padding:"2px 8px",
                                    fontWeight:"bold",
                                    background: t.score >= Math.ceil(t.total*0.8) ? C.ok+"33" : C.ng+"22",
                                    color:       t.score >= Math.ceil(t.total*0.8) ? C.ok : C.ng,
                                    border:`1px solid ${t.score >= Math.ceil(t.total*0.8) ? C.ok : C.ng}` }}>
                                    {ti+1}回目 {t.score}/{t.total}
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                          <div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
                            <div style={{ fontSize:24, fontWeight:"bold",
                              color: isPass?C.ok : isFail?C.ng : C.text }}>
                              {e.score}<span style={{ fontSize:13, color:C.muted }}>/{e.total}</span>
                            </div>
                            <div style={{ fontSize:11, color:C.muted }}>
                              {Math.round((e.score/e.total)*100)}%
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  if (screen === "calendar") {
    const stepsWithData = STEPS.filter(s => work.steps[s.id]);
    return (
      <div style={P.page}>
        <div style={P.bar}>
          <button style={P.back} onClick={() => setScreen("home")}>← もどる</button>
          <span style={{ fontSize:18, fontWeight:"bold" }}>日付・リセット</span>
          <span />
        </div>
        <div style={{ margin:"12px 16px 4px", background:"#fff", border:"1.5px solid #EAD8C0",
          borderRadius:14, padding:14 }}>
          <div style={{ fontSize:12, color:C.muted, marginBottom:8 }}>📅 日付をかえてテストできます</div>
          <input type="date"
            value={customDate || toDateStr(new Date())}
            onChange={e => setCustomDate(e.target.value)}
            style={{ border:"1.5px solid #EAD8C0", borderRadius:8, padding:"8px 10px",
              fontSize:16, width:"100%", boxSizing:"border-box",
              userSelect:"auto", WebkitUserSelect:"auto" }} />
          {customDate && (
            <button style={{ marginTop:8, background:"none", border:"none", fontSize:13,
              color:C.ng, cursor:"pointer", padding:0, fontWeight:"bold" }}
              onClick={() => setCustomDate("")}>→ 今日にもどす</button>
          )}
        </div>
        <div style={{ padding:"10px 16px 6px", fontSize:12, color:C.muted }}>
          ↓ ステップをタップすると、日付ごとにリセットできます
        </div>
        {stepsWithData.length === 0 ? (
          <div style={{ textAlign:"center", padding:32, color:C.muted }}>記録がありません</div>
        ) : (
          <div style={{ padding:"0 16px", display:"flex", flexDirection:"column", gap:10, paddingBottom:40 }}>
            {stepsWithData.map(step => {
              const p = work.steps[step.id];
              const st = getStatus(step.id, work.steps, today);
              const color = STEP_COLORS[step.id - 1];
              const isExpanded = expandedStepId === step.id;
              const done = p.reviewsDone || [];

              const milestones = [
                { label: "0日目", date: p.passedDate, achieved: !!p.passed },
                ...REVIEW_DAYS.map(d => {
                  const date = p.passed ? addDays(p.passedDate, d) : null;
                  return { label: `${d}日後`, date, achieved: date ? done.includes(date) : false };
                }),
              ].filter(m => m.achieved); 

              return (
                <div key={step.id} style={{ background:"#fff", border:`1.5px solid ${C.border}`,
                  borderLeft:`5px solid ${color}`, borderRadius:16, overflow:"hidden" }}>
                  <button
                    onClick={() => setExpandedStepId(isExpanded ? null : step.id)}
                    style={{ width:"100%", background:"none", border:"none", padding:"14px 16px",
                      display:"flex", justifyContent:"space-between", alignItems:"center",
                      cursor:"pointer", textAlign:"left" }}>
                    <div>
                      <div style={{ fontWeight:"bold", fontSize:18, letterSpacing:3, color:C.text }}>
                        {step.pair.join(" ・ ")}
                        <span style={{ fontSize:14, marginLeft:8 }}>{statusEmoji(st)}</span>
                      </div>
                      <div style={{ fontSize:12, color:C.muted, marginTop:3 }}>
                        {p.passed ? `合格：${fmtJP(p.passedDate)}` : "未合格"}
                        {p.lastTried ? `　最終：${fmtJP(p.lastTried)}` : ""}
                      </div>
                    </div>
                    <span style={{ fontSize:18, color:C.muted }}>{isExpanded ? "▲" : "▼"}</span>
                  </button>

                  {isExpanded && (
                    <div style={{ borderTop:`1.5px dashed ${C.border}`, padding:"12px 16px",
                      display:"flex", flexDirection:"column", gap:8, background:"#FFFBF2" }}>
                      {milestones.length === 0 ? (
                        <div style={{ fontSize:12, color:C.muted, textAlign:"center", padding:8 }}>
                          まだ記録がありません
                        </div>
                      ) : milestones.map(m => (
                        <div key={m.label} style={{ display:"flex", justifyContent:"space-between",
                          alignItems:"center", background:"#fff", borderRadius:10, padding:"8px 12px",
                          border:`1px solid ${C.border}` }}>
                          <div>
                            <span style={{ fontWeight:"bold", fontSize:14 }}>{m.label}</span>
                            <span style={{ fontSize:12, color:C.muted, marginLeft:8 }}>
                              {fmtJP(m.date)}
                            </span>
                          </div>
                          <button
                            style={{ background:C.ng, color:"#fff", border:"none", borderRadius:8,
                              padding:"6px 12px", fontWeight:"bold", fontSize:12, cursor:"pointer" }}
                            onClick={() => {
                              upd(prev => computeResetMilestone(prev, step.id, m.label));
                              setSkipIds(prev => {
                                const next = new Set(prev);
                                next.delete(step.id);
                                return next;
                              });
                              if (m.label === "0日目") setExpandedStepId(null);
                            }}>
                            リセット
                          </button>
                        </div>
                      ))}
                      <div style={{ fontSize:11, color:C.muted, textAlign:"center", marginTop:4 }}>
                        ※「0日目」をリセットすると、このステップ全体が最初からになります
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={P.page}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start",
        padding:"20px 16px 14px" }}>
        <div>
          <div style={{ fontSize:11, color:C.muted, marginBottom:2 }}>
            きょうの日付　<span style={{ fontSize:10, color:"#A8D8EA" }}>▼ タップで変更</span>
          </div>
          <div
            style={{ fontSize:32, fontWeight:"bold", lineHeight:1.1, cursor:"pointer",
              borderBottom:`2px dashed ${customDate ? C.ng : C.border}`, paddingBottom:2, display:"inline-block" }}
            onClick={() => setScreen("calendar")}>
            {fmtJPFull(today)}
            {customDate && <span style={{ fontSize:13, color:C.ng, marginLeft:6 }}>✏️</span>}
          </div>
          {customDate && (
            <button style={{ display:"block", marginTop:4, background:"none", border:"none",
              fontSize:12, color:C.ng, cursor:"pointer", padding:0 }}
              onClick={() => setCustomDate("")}>→ 今日にもどす</button>
          )}
        </div>
        <div style={{ display:"flex", gap:8, flexShrink:0, paddingTop:4 }}>
          <button style={P.icon} onClick={() => setScreen("history")}>📋</button>
          <button style={P.icon} onClick={() => setScreen("steps")}>📚</button>
        </div>
      </div>

      <div style={{ padding:"0 16px" }}>
        <div style={{ fontSize:13, fontWeight:"bold", color:C.muted, marginBottom:10 }}>きょうやること</div>

        {allDoneNow && (
          <div style={{ background:"#fff", border:`2px solid ${C.ok}`, borderRadius:20,
            padding:"20px", marginBottom:12 }}>
            <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:12 }}>
              <div style={{ fontSize:28 }}>✅</div>
              <div>
                <div style={{ fontWeight:"bold", fontSize:15 }}>きょうはおわり！</div>
                <div style={{ fontSize:12, color:C.muted, marginTop:2 }}>よくできました</div>
              </div>
            </div>
            {moreAvailable && (
              <button style={{ width:"100%", border:"none", borderRadius:12, padding:"13px 0",
                background:C.yellow, fontSize:15, fontWeight:"bold", cursor:"pointer" }}
                onClick={() => setScreen("stepselect")}>
                💪 もう1セットやる！
              </button>
            )}
          </div>
        )}

        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {todayTasks.map((task, i) => {
            const color = STEP_COLORS[task.id - 1];
            const isRev = task.taskType === "review" || task.taskType === "overdue";
            const dn    = isRev ? nextReviewDayNum(task.id, work.steps, today) : null;
            return (
              <div key={i} style={{ background:"#fff", borderRadius:20, padding:"20px",
                border:`2.5px solid ${color}`, boxShadow:"0 3px 12px rgba(0,0,0,0.07)",
                position:"relative", overflow:"hidden" }}>
                <div style={{ position:"absolute", top:0, left:0, right:0, height:6, background:color }} />
                <div style={{ marginTop:6 }}>
                  <div style={{ marginBottom:10 }}>
                    <span style={{
                      background: isRev ? "#FFB347"
                        : task.taskType === "retry" ? "#FFDAC1" : "#A8D8EA",
                      borderRadius:10, padding:"3px 10px", fontSize:12, fontWeight:"bold" }}>
                      {task.taskType === "new"     && "✨ あたらしい"}
                      {task.taskType === "retry"   && "💪 チャレンジ"}
                      {task.taskType === "review"  && `🔁 ${dn}日後の復習`}
                      {task.taskType === "overdue" && `⚠️ ${dn}日後の復習（おくれ）`}
                    </span>
                  </div>
                  <div style={{ display:"flex", gap:16, alignItems:"center", marginBottom:16 }}>
                    {task.pair.map((ch, ci) => (
                      <div key={ci} style={{ textAlign:"center" }}>
                        <div style={{ fontSize:60, fontWeight:"bold", lineHeight:1,
                          background: STEP_COLORS[(task.id-1+ci) % STEP_COLORS.length],
                          borderRadius:16, width:80, height:80,
                          display:"flex", alignItems:"center", justifyContent:"center" }}>{ch}</div>
                        <div style={{ fontSize:13, color:C.muted, marginTop:4, fontWeight:"bold" }}>
                          {task.kana[ci]}
                        </div>
                      </div>
                    ))}
                  </div>
                  <button style={{ width:"100%", border:"none", borderRadius:14, padding:"14px 0",
                    background:color, fontSize:18, fontWeight:"bold", cursor:"pointer" }}
                    onClick={() => startQuiz(task, isRev ? task.taskType : "new")}>
                    はじめる →
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        {extraOverdue > 0 && (
          <div style={{ marginTop:12, background:"#FFF3CD", border:"1.5px solid #FFE066",
            borderRadius:14, padding:"10px 16px", fontSize:13, color:"#7A6000", textAlign:"center" }}>
            ⚠️ あと {extraOverdue} 件の復習おくれがあります
          </div>
        )}
      </div>
      <div style={{ height:40 }} />
    </div>
  );
}

const P = {
  page: { minHeight:"100vh", background:"#FFFBF2",
    fontFamily:"'UD デジタル 教科書体 N-R','UDDigiKyokashoN-R','UD Digi Kyokasho NK-R','HGS教科書体','HG教科書体','Hiragino Mincho ProN','Hiragino Maru Gothic Pro','Yu Gothic',sans-serif",
    color:"#3D2C2C", maxWidth:480, margin:"0 auto",
    userSelect:"none", WebkitUserSelect:"none",
    WebkitTouchCallout:"none",
    overscrollBehaviorX:"none", overscrollBehaviorY:"contain",
  },
  bar:  { display:"flex", justifyContent:"space-between", alignItems:"center",
    padding:"16px 20px", borderBottom:"2px dashed #EAD8C0" },
  back: { background:"none", border:"none", fontWeight:"bold", cursor:"pointer", fontSize:15, color:"#3D2C2C" },
  icon: { background:"#fff", border:"1.5px solid #EAD8C0", borderRadius:12, width:44, height:44,
    fontSize:20, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" },
  note: { background:"#fff", border:"2px dashed #EAD8C0", borderRadius:16, padding:16,
    width:"100%", textAlign:"center", lineHeight:1.8 },
  next: { background:"#3D2C2C", color:"#fff", border:"none", borderRadius:16,
    padding:"16px", fontSize:18, fontWeight:"bold", cursor:"pointer" },
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
